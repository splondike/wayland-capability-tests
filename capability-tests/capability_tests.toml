# List of tests

[[tests]]
feature = "mouse_move_absolute"
compositors = ["sway", "hyprland"]
implementation_requirements = ["wayland_nonstandard"]
implementation = "test_wlroots.mouse_move_absolute"
failing_compositors = ["hyprland"]

[[tests]]
feature = "mouse_click"
compositors = ["sway", "hyprland"]
implementation_requirements = ["wayland_nonstandard"]
implementation = "test_wlroots.mouse_click"
failing_compositors = ["hyprland"]

[[tests]]
feature = "mouse_scroll"
compositors = ["sway", "hyprland"]
implementation_requirements = ["wayland_nonstandard"]
implementation = "test_wlroots.mouse_scroll"
failing_compositors = ["sway", "hyprland"]

[[tests]]
feature = "mouse_move_absolute"
compositors = ["gnome", "kde"]
implementation_requirements = ["desktop_portal"]
implementation = "test_desktop_portal.mouse_move_absolute"

[[tests]]
feature = "mouse_click"
compositors = ["gnome", "kde"]
implementation_requirements = ["desktop_portal"]
implementation = "test_desktop_portal.mouse_click"

[[tests]]
feature = "mouse_scroll"
compositors = ["gnome", "kde"]
implementation_requirements = ["desktop_portal"]
implementation = "test_desktop_portal.mouse_scroll"

[[tests]]
feature = "keyboard_press"
compositors = ["gnome", "kde"]
implementation_requirements = ["desktop_portal"]
implementation = "test_desktop_portal.keyboard_press"

[[tests]]
feature = "clipboard"
compositors = ["gnome"]
implementation_requirements = ["wayland_stable"]
implementation = "test_wayland_core.clipboard"
caveats = "Requires the application to have a focussed window to set or get the clipboard contents"

# Other notes: remotedesktop has a clipboard implementation. There's the ext-data-control Wayland protocol for clipboard managers too.

# The features we implement in the above tests

[[features]]
name = "mouse_move_absolute"
description = "Move the mouse cursor to an absolute position"

[[features]]
name = "mouse_click"
description = "Emulate left, right, and middle mouse clicks"

[[features]]
name = "mouse_scroll"
description = "Send mouse scrollwheel events"
